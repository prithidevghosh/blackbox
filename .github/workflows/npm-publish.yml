# Publish @prithidevghosh/blackbox when a GitHub release is published (or
# manually via the Actions tab). Unit tests gate both publishes; the e2e
# harness needs a live Supermemory Local, so it stays local-only.
# Two registries, independent jobs:
#   - npmjs.com — the real install source; needs the NPM_TOKEN repo secret
#     (npmjs.com → Access Tokens → Granular, read/write on this package)
#   - GitHub Packages — populates the repo's "Packages" sidebar; uses the
#     built-in GITHUB_TOKEN, no setup needed
name: npm publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-packages:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
